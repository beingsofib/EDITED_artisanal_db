<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../css_js/5eadb.css">
<title>Creature Encounter Generator</title>
</head>
<body>
<div><a href="../../index.html">5e Artisanal Database</a> → Creature Encounter Generator</div>

<h1>Creature Encounter Generator</h1>

<select id="terrainSelect" onchange="selectTerrain()">
  <option value="urban_creature">Urban</option>
  <option value="grass_creature">Grassland</option>
  <option value="mountain_creature">Mountain</option>
  <option value="hill_creature">Hill</option>
</select>
<button onclick="generateContent()">Roll</button>
<button onclick="randomTerrain()">Random Terrain</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../css_js/common_generator_data.js"></script>
<script src="../css_js/generator.js"></script>
<script src="../custom_css_js/homebrew_generator.js"></script>

<script>
function selectTerrain() {
    const terrain = document.getElementById('terrainSelect').value;
    window.dataText = addCommonDataTo(`template\n    {${terrain}}\n\n`);
    generateContent();
}

function randomTerrain() {
    const sel = document.getElementById('terrainSelect');
    sel.selectedIndex = Math.floor(Math.random() * sel.options.length);
    selectTerrain();
}

// Pre-set dataText with default selection
window.dataText = addCommonDataTo(
    `template\n    {${document.getElementById('terrainSelect').value}}\n\n`
);
</script>

</body>
</html>
