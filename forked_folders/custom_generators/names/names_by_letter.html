const NUMBER_OF_RESULTS = 10;

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateNames() {
  const letter = document.getElementById('letterSelect').value;
  const names = namesByLetter[letter] || [];
  const count = names.length;

  document.getElementById('nameCount').textContent = count + ' name' + (count !== 1 ? 's' : '') + ' available';

  if (count === 0) {
    document.getElementById('output').innerHTML = '<em>No names available for this letter.</em>';
    return;
  }

  const results = [];
  for (let i = 0; i < NUMBER_OF_RESULTS; i++) {
    results.push(pick(names));
  }

  const html = '<ol>' + results.map(n => '<li>' + n + '</li>').join('') + '</ol>';
  document.getElementById('output').innerHTML = html;
}

window.addEventListener('load', generateNames);
