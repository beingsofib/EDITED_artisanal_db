<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../css_js/5eadb.css">
<title>City Encounter Generator</title>
</head>
<body>
<div><a href="../../index.html">5e Artisanal Database</a> → <a href="../index.html">Homebrew Generators</a> → City Encounter Generator</div>

<h1>City Encounter Generator</h1>

<select id="districtSelect" onchange="selectDistrict()">
  <option value="squalid">Squalid District</option>
  <option value="low">Low District</option>
  <option value="artisan">Artisan District</option>
  <option value="market">Market District</option>
  <option value="high">High District</option>
  <option value="fish">Fishing District</option>
  <option value="temple">Temple District</option>
  <option value="castle">Castle District</option>
  <option value="dock">Docks District</option>
  <option value="university">University District</option>
</select>
<button onclick="generateContent()">Roll</button>
<button onclick="randomDistrict()">Random District</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../css_js/common_generator_data.js"></script>
<script src="../css_js/generator.js"></script>
<script src="../custom_css_js/homebrew_generator.js"></script>

<script>
window.generateCount = 1;

// Maps district key → { day, night } table names.
// Most follow a regular pattern but a few diverge from it.
const encounterTables = {
    squalid:    { day: 'squalid_encounter_day',        night: 'squalid_encounter_night'        },
    low:        { day: 'low_district_encounter_day',   night: 'low_district_encounter_night'   },
    artisan:    { day: 'artisan_encounter_day',        night: 'artisan_encounter_night'        },
    market:     { day: 'market_encounter_day',         night: 'market_encounter_night'         },
    high:       { day: 'high_district_encounter_day',  night: 'high_encounter_night'           },
    fish:       { day: 'fish_encounter_day',           night: 'fish_encounter_night'           },
    temple:     { day: 'temple_encounter_day',         night: 'temple_encounter_night'         },
    castle:     { day: 'castle_encounter_day',         night: 'castle_encounter_night'         },
    dock:       { day: 'dock_encounter_day',           night: 'dock_encounter_night'           },
    university: { day: 'university_encounter_day',     night: 'university_encounter_night'     },
};

function selectDistrict() {
    const key = document.getElementById('districtSelect').value;
    const { day, night } = encounterTables[key];
    window.dataText = addCommonDataTo(
        `template\n    <p><strong>By Day:</strong> {${day}}</p><p><strong>By Night:</strong> {${night}}</p>\n\n`
    );
    generateContent();
}

function randomDistrict() {
    const sel = document.getElementById('districtSelect');
    sel.selectedIndex = Math.floor(Math.random() * sel.options.length);
    selectDistrict();
}

window.addEventListener('load', selectDistrict);
</script>

</body>
</html>
