<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../css_js/5eadb.css">
<title>Town Shop Generator</title>
</head>
<body>
<div><a href="../../index.html">5e Artisanal Database</a> → <a href="../index.html">Homebrew Generators</a> → Town Shop Generator</div>

<h1>Town Shop Generator</h1>

<select id="tierSelect" onchange="selectTier()">
  <option value="town_shops">Common</option>
  <option value="unusual_shop">Unusual</option>
</select>
<button onclick="generateContent()">Roll</button>
<button onclick="randomTier()">Random</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../css_js/common_generator_data.js"></script>
<script src="../css_js/generator.js"></script>
<script src="../custom_css_js/homebrew_generator.js"></script>

<script>
// unusual_shop mirrors the town_shops composite but draws from shop_type3
// (guilds, theatres, mage colleges, law courts, etc.) which has no existing
// composite table of its own.
const extraData = `
unusual_shop
  <p><strong>{name} {shop_name_suffix}</strong> — {shop_type3}<br>{shop_appearance}. {shop_known}<br>Run by {shop_npc}</p>

`;

function selectTier() {
    const table = document.getElementById('tierSelect').value;
    window.dataText = addCommonDataTo(
        extraData + `template\n    {${table}}\n\n`
    );
    generateContent();
}

function randomTier() {
    const sel = document.getElementById('tierSelect');
    sel.selectedIndex = Math.floor(Math.random() * sel.options.length);
    selectTier();
}

// Pre-set dataText with default selection
window.dataText = addCommonDataTo(
    extraData + `template\n    {${document.getElementById('tierSelect').value}}\n\n`
);
</script>

</body>
</html>
