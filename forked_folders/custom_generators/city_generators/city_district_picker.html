<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../css_js/5eadb.css">
<title>City District Generator</title>
</head>
<body>
<div><a href="../../../index.html">5e Artisanal Database</a> → <a href="../../index.html">Homebrew Generators</a> → City District Generator</div>

<h1>City District Generator</h1>

<select id="districtSelect" onchange="selectDistrict()">
  <option value="artisan_district">Artisan District</option>
  <option value="castle_district">Castle District</option>
  <option value="dock_district">Docks District</option>
  <option value="fishing_district">Fishing District</option>
  <option value="high_district">High District</option>
  <option value="low_district">Low District</option>
  <option value="market_district">Market District</option>
  <option value="squalid_district">Squalid District</option>
  <option value="temple_district">Temple District</option>
  <option value="university_district">University District</option>
</select>
<button onclick="generateContent()">Roll</button>
<button onclick="randomDistrict()">Random District</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../../css_js/common_generator_data.js"></script>
<script src="../../css_js/generator.js"></script>
<script src="../../custom_css_js/homebrew_generator.js"></script>

<script>
window.generateCount = 1;
function selectDistrict() {
    const table = document.getElementById('districtSelect').value;
    window.dataText = addCommonDataTo(`template\n    {${table}}\n\n`);
    generateContent();
}

function randomDistrict() {
    const sel = document.getElementById('districtSelect');
    sel.selectedIndex = Math.floor(Math.random() * sel.options.length);
    selectDistrict();
}

window.addEventListener('load', selectDistrict);
</script>

</body>
</html>
