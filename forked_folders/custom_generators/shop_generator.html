<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../css_js/5eadb.css">
<title>Shop Generator</title>
</head>
<body>
<div><a href="../../index.html">5e Artisanal Database</a> → <a href="../index.html">Homebrew Generators</a> → Shop Generator</div>

<h1>Shop Generator</h1>

<select id="tierSelect" onchange="selectTier()">
  <option value="city_squalid_shops">Squalid</option>
  <option value="city_low_shops">Low</option>
  <option value="city_artisan_shops">Artisan</option>
  <option value="city_market_shops">Market</option>
  <option value="city_high_shops">High</option>
  <option value="city_castle_shops">Castle</option>
</select>
<button onclick="generateContent()">Roll</button>
<button onclick="randomTier()">Random Tier</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../css_js/common_generator_data.js"></script>
<script src="../css_js/generator.js"></script>
<script src="../custom_css_js/homebrew_generator.js"></script>

<script>
function selectTier() {
    const table = document.getElementById('tierSelect').value;
    window.dataText = addCommonDataTo(`template\n    {${table}}\n\n`);
    generateContent();
}

function randomTier() {
    const sel = document.getElementById('tierSelect');
    sel.selectedIndex = Math.floor(Math.random() * sel.options.length);
    selectTier();
}

// Pre-set dataText with default selection
window.dataText = addCommonDataTo(
    `template\n    {${document.getElementById('tierSelect').value}}\n\n`
);
</script>

</body>
</html>
