<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../css_js/5eadb.css">
<title>Magic Items by Rarity</title>
</head>
<body>
<div><a href="../../index.html">5e Artisanal Database</a> → <a href="../index.html">Homebrew Generators</a> → Magic Items by Rarity</div>

<h1>Magic Items by Rarity</h1>

<select id="raritySelect" onchange="selectRarity()">
  <option value="common_magic">Common</option>
  <option value="uncommon_magic">Uncommon</option>
  <option value="rare_magic">Rare</option>
  <option value="very_rare_magic">Very Rare</option>
  <option value="legendary_magic">Legendary</option>
  <option value="sentient_magic">Sentient</option>
  <option value="artifacts_magic">Artifact</option>
</select>
<button onclick="generateContent()">Roll</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../css_js/common_generator_data.js"></script>
<script src="../css_js/generator.js"></script>
<script src="../custom_css_js/homebrew_generator.js"></script>

<script>
function selectRarity() {
    const table = document.getElementById('raritySelect').value;
    window.dataText = addCommonDataTo(`template\n    {${table}}\n\n`);
    generateContent();
}

// Pre-set dataText with default selection
window.dataText = addCommonDataTo(
    `template\n    {${document.getElementById('raritySelect').value}}\n\n`
);
</script>

</body>
</html>
