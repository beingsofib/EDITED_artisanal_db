<h1>Dungeon Room Contents</h1>

<select id="tierSelect" onchange="selectTier()">
    <option value="minor">Minor (levels 1–4)</option>
    <option value="standard" selected>Standard (levels 5–10)</option>
    <option value="deadly">Deadly (levels 10+)</option>
</select>
<button onclick="generateContent()">Roll</button>

<div id="output">
    <em>Click the button above to generate content...</em>

// ── Tier selection ────────────────────────────────────────────────────────

function buildDataText(tier) {
    const tierBlock = tierData[tier] || tierData.standard;
    return addCommonDataTo(tierBlock + sharedData);
}

function selectTier() {
    const tier = document.getElementById('tierSelect').value;
    window.dataText = buildDataText(tier);
    generateContent();
}

// ── Init ──────────────────────────────────────────────────────────────────

window.dataText = buildDataText(document.getElementById('tierSelect').value);
