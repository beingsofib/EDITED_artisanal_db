<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta charset="UTF-8">
<link rel="stylesheet" href="../../css_js/5eadb.css">
<title>Market Stalls Generator</title>
</head>
<body>
<div><a href="../../index.html">5e Artisanal Database</a> → <a href="../index.html">Homebrew Generators</a> → Market Stalls Generator</div>

<h1>Market Stalls Generator</h1>

<select id="tierSelect" onchange="selectTier()">
  <option value="village_market">Village Market</option>
  <option value="town_market">Town Market</option>
  <option value="city_market">City Market</option>
</select>
<button onclick="generateContent()">Roll</button>

<div id="output">
    <em>Click the button above to generate content...</em>
</div>

<!-- Load shared common data -->
<script src="../css_js/common_generator_data.js"></script>
<script src="../css_js/generator.js"></script>
<script src="../custom_css_js/homebrew_generator.js"></script>

<script>
window.generateCount = 1;

function selectTier() {
    const table = document.getElementById('tierSelect').value;
    window.dataText = addCommonDataTo(`template\n    {${table}}\n\n`);
    generateContent();
}

window.addEventListener('load', selectTier);
</script>

</body>
</html>
