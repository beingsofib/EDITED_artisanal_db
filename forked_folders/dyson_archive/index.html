<!DOCTYPE html>
<html>
<head>
  <title>Dyson Commercial Map Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; }
    h1 { text-align: center; }
    .slider-container { text-align: center; padding: 20px; }
    .gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .gallery img { border: 2px solid #f0f0f0; border-radius: 5px; width: 400px; transition: transform 0.2s ease; }
    .gallery img:hover { transform: scale(1.1); border-color: #ccc; }
  </style>
</head>
<body>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var slider = document.getElementById('sizeSlider');
      var gallery = document.querySelector('.gallery');
      slider.addEventListener('input', function () {
        gallery.querySelectorAll('img').forEach(img => {
          img.style.width = this.value + 'px';
          img.style.height = 'auto';
        });
      });
      Array.from(gallery.children).sort(() => Math.random() - 0.5).forEach(n => gallery.appendChild(n));
    });
  </script>
  <div style="text-align: center; padding: 0 3em;">
    <h1>Dyson Commercial Map Gallery</h1>
    <p>A gallery of <a href="https://dysonlogos.blog/maps/commercial-maps/">Dyson Logos's royalty-free maps</a>,
    available to <a href="https://www.patreon.com/slyflourish">Patrons of Sly Flourish</a>.
    </p>
  </div>
  <div class="slider-container">
    <label for="sizeSlider">Adjust Thumbnail Size:</label>
    <input type="range" id="sizeSlider" min="50" max="800" value="400">
