<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgotten — Markdown Search</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1915;
    --border: #2e2c27;
    --accent: #c9a84c;
    --accent-dim: #7a6530;
    --text: #e8e4d9;
    --text-muted: #7a776e;
    --result-bg: #141310;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 860px; margin: 0 auto; }

  header {
    margin-bottom: 48px;
    border-left: 3px solid var(--accent);
    padding-left: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 36px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(201, 168, 76, 0.04);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }
  .upload-label { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 1px; }
  .upload-label span { color: var(--accent); font-weight: 500; }

  .progress-wrap {
    display: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.12s linear;
  }

  .file-info {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 16px;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 20px;
    gap: 10px;
    align-items: center;
  }
  .file-info.visible { display: flex; }
  .file-info .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .search-bar { display: flex; gap: 10px; margin-bottom: 8px; }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }

  .btn {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 4px;
    padding: 12px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }

  .stats {
    color: var(--text-muted);
    font-size: 0.72rem;
    letter-spacing: 1px;
    margin-bottom: 24px;
    min-height: 16px;
  }

  /* Virtual scroll */
  #scroll-viewport {
    height: 70vh;
    overflow-y: auto;
    position: relative;
  }
  #scroll-viewport::-webkit-scrollbar { width: 6px; }
  #scroll-viewport::-webkit-scrollbar-track { background: var(--bg); }
  #scroll-viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #scroll-spacer { width: 1px; pointer-events: none; }

  #scroll-content {
    position: absolute;
    top: 0; left: 0; right: 0;
  }

  .result-item {
    background: var(--result-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.15s;
    position: absolute;
    left: 0; right: 0;
  }
  .result-item:hover { border-color: var(--accent-dim); }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    min-height: 52px;
  }

  .result-num {
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 1px;
    flex-shrink: 0;
    opacity: 0.7;
    min-width: 36px;
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    flex: 1;
  }
  .result-title mark {
    background: rgba(201, 168, 76, 0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 2px;
  }

  .toggle-icon {
    color: var(--text-muted);
    font-size: 0.7rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .toggle-icon.open { transform: rotate(90deg); }

  .result-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
  }
  .result-body.open { display: block; }
  .result-body pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.7;
    padding-top: 16px;
  }
  .result-body pre mark {
    background: rgba(201, 168, 76, 0.2);
    color: var(--text);
    border-radius: 2px;
    padding: 0 2px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Forgotten</h1>
    <p class="subtitle">Search top-level headings &amp; their content</p>
  </header>

  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".md,.markdown,.txt">
    <div class="upload-icon" id="uploadIcon">⌘</div>
    <p class="upload-label" id="uploadLabel">Auto-loading <span>forgotten.md</span>…</p>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="file-info" id="fileInfo">
    <span class="dot"></span>
    <span id="fileName"></span>
    <span>—</span>
    <span id="entryCount"></span>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search headings or content..." disabled>
    <button class="btn" onclick="clearSearch()">CLEAR</button>
  </div>

  <div class="stats" id="stats"></div>

  <div id="scroll-viewport">
    <div id="scroll-spacer"></div>
    <div id="scroll-content"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let entries  = [];   // { title, titleLower, bodyText, bodyLower }
let filtered = [];   // indices into entries
let expandedSet = new Set(); // virtual-row indices that are expanded

// ── DOM refs ──────────────────────────────────────────────────────────────────
const viewport     = document.getElementById('scroll-viewport');
const spacer       = document.getElementById('scroll-spacer');
const content      = document.getElementById('scroll-content');
const statsEl      = document.getElementById('stats');
const searchInput  = document.getElementById('searchInput');
const fileInfoEl   = document.getElementById('fileInfo');
const uploadLabel  = document.getElementById('uploadLabel');
const uploadIcon   = document.getElementById('uploadIcon');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');

// ── Virtual scroll ────────────────────────────────────────────────────────────
const ROW_H  = 54;   // collapsed row height (px)
const OVERSCAN = 6;

let rowOffsets  = [];
let totalHeight = 0;

function estimateExpandedHeight(vi) {
  const chars = entries[filtered[vi]].bodyText.length;
  // ~80 chars per line, ~20px per line, plus header + padding
  return ROW_H + Math.min(800, Math.ceil(chars / 80) * 20 + 50);
}

function buildOffsets() {
  rowOffsets = new Float64Array(filtered.length);
  let y = 0;
  for (let i = 0; i < filtered.length; i++) {
    rowOffsets[i] = y;
    y += expandedSet.has(i) ? estimateExpandedHeight(i) : ROW_H;
  }
  totalHeight = y;
  spacer.style.height = totalHeight + 'px';
}

function visibleRange() {
  const top    = viewport.scrollTop;
  const bottom = top + viewport.clientHeight;
  const padTop = top - ROW_H * OVERSCAN;
  const padBot = bottom + ROW_H * OVERSCAN;

  // Binary search for start
  let lo = 0, hi = filtered.length - 1, start = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (rowOffsets[mid] < padTop) { start = mid; lo = mid + 1; }
    else hi = mid - 1;
  }

  let end = start;
  while (end < filtered.length - 1 && rowOffsets[end + 1] < padBot) end++;
  return [start, Math.min(end, filtered.length - 1)];
}

function renderVisible() {
  if (filtered.length === 0) return;
  const [start, end] = visibleRange();
  const q = searchInput.value.trim();

  // Reuse existing nodes where possible by keying on vi
  const existing = new Map();
  for (const node of content.children) {
    existing.set(+node.dataset.vi, node);
  }

  const needed = new Set();
  for (let vi = start; vi <= end; vi++) needed.add(vi);

  // Remove nodes no longer visible
  for (const [vi, node] of existing) {
    if (!needed.has(vi)) node.remove();
  }

  // Add / update needed nodes
  for (let vi = start; vi <= end; vi++) {
    const ei      = filtered[vi];
    const entry   = entries[ei];
    const isOpen  = expandedSet.has(vi);
    const hasBody = entry.bodyText.trim().length > 0;
    const top     = rowOffsets[vi];

    let item = existing.get(vi);
    if (!item) {
      item = document.createElement('div');
      item.className = 'result-item';
      item.dataset.vi = vi;
      content.appendChild(item);
    }

    item.style.top = top + 'px';

    // Only re-render innerHTML if state changed
    const prevOpen = item.dataset.open === '1';
    if (item.dataset.ei !== String(ei) || prevOpen !== isOpen || item.dataset.q !== q) {
      item.dataset.ei   = ei;
      item.dataset.open = isOpen ? '1' : '0';
      item.dataset.q    = q;

      item.innerHTML = `
        <div class="result-header">
          <span class="result-num">#${String(vi+1).padStart(3,'0')}</span>
          <span class="result-title">${highlight(entry.title, q)}</span>
          ${hasBody ? `<span class="toggle-icon${isOpen?' open':''}">▶</span>` : ''}
        </div>
        ${hasBody && isOpen ? `<div class="result-body open"><pre>${highlight(entry.bodyText, q)}</pre></div>` : ''}
      `;

      if (hasBody) {
        item.querySelector('.result-header').addEventListener('click', () => toggleRow(vi));
      }
    }
  }
}

function toggleRow(vi) {
  if (expandedSet.has(vi)) expandedSet.delete(vi);
  else expandedSet.add(vi);
  buildOffsets();
  renderVisible();
}

viewport.addEventListener('scroll', renderVisible, { passive: true });
new ResizeObserver(() => { buildOffsets(); renderVisible(); }).observe(viewport);

// ── Search (debounced 200ms) ───────────────────────────────────────────────────
let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => applySearch(searchInput.value.trim()), 200);
});

function applySearch(q) {
  expandedSet.clear();
  const ql = q.toLowerCase();

  if (!ql) {
    filtered = Array.from({ length: entries.length }, (_, i) => i);
  } else {
    filtered = [];
    for (let i = 0; i < entries.length; i++) {
      if (entries[i].titleLower.includes(ql) || entries[i].bodyLower.includes(ql)) {
        filtered.push(i);
      }
    }
  }

  statsEl.textContent = q
    ? `${filtered.length.toLocaleString()} of ${entries.length.toLocaleString()} entries match`
    : `${entries.length.toLocaleString()} entries loaded`;

  viewport.scrollTop = 0;
  content.innerHTML  = '';

  if (filtered.length === 0) {
    spacer.style.height = '0px';
    content.innerHTML = `<div class="empty">${entries.length ? 'NO MATCHES FOUND' : 'LOAD A MARKDOWN FILE TO BEGIN'}</div>`;
    return;
  }

  buildOffsets();
  renderVisible();
}

// ── Parser (fast single-pass) ─────────────────────────────────────────────────
// Entries start at "# Title" and end at the next "---" separator (or EOF).
// The "---" line itself is excluded from the displayed body.
function parseMarkdown(text) {
  entries = [];
  const len = text.length;
  let lineStart = 0;
  let currentTitle = null;
  let bodyStart = 0;

  function flush(end) {
    if (currentTitle !== null) {
      const bodyText = text.slice(bodyStart, end).trimEnd();
      entries.push({
        title:      currentTitle,
        titleLower: currentTitle.toLowerCase(),
        bodyText,
        bodyLower:  bodyText.toLowerCase()
      });
      currentTitle = null;
    }
  }

  while (lineStart < len) {
    let lineEnd = text.indexOf('\n', lineStart);
    if (lineEnd === -1) lineEnd = len;

    const lineLen = lineEnd - lineStart;

    // H1 heading: "# Title"
    if (text.charCodeAt(lineStart) === 35 && text.charCodeAt(lineStart + 1) === 32) {
      // Close any open entry first (handles files that mix --- and headings)
      flush(lineStart);
      currentTitle = text.slice(lineStart + 2, lineEnd).trim();
      bodyStart = lineEnd + 1;

    // Entry separator: line is exactly "---"
    } else if (
      lineLen === 3 &&
      text.charCodeAt(lineStart)     === 45 &&
      text.charCodeAt(lineStart + 1) === 45 &&
      text.charCodeAt(lineStart + 2) === 45
    ) {
      flush(lineStart); // body ends just before the ---
    }

    lineStart = lineEnd + 1;
  }

  // Close any entry still open at EOF
  flush(len);
}

// ── Load helpers ──────────────────────────────────────────────────────────────
function setProgress(pct) {
  progressWrap.classList.add('visible');
  progressBar.style.width = pct + '%';
}

function setLoaded(name) {
  uploadIcon.textContent = '✓';
  uploadLabel.innerHTML  = `Loaded <span>${name}</span>`;
  document.getElementById('fileName').textContent  = name;
  document.getElementById('entryCount').textContent = `${entries.length.toLocaleString()} top-level entries`;
  fileInfoEl.classList.add('visible');
  progressWrap.classList.remove('visible');
  searchInput.disabled = false;
  searchInput.focus();
  applySearch('');
}

// Stream fetch with progress bar
async function autoLoad() {
  try {
    const res = await fetch('forgotten.md');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const total   = +res.headers.get('Content-Length') || 0;
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let received  = 0;
    const parts   = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      received += value.length;
      parts.push(decoder.decode(value, { stream: true }));
      if (total) setProgress(Math.round(received / total * 90));
    }
    parts.push(decoder.decode()); // flush remaining

    setProgress(95);
    await yieldToUI();
    parseMarkdown(parts.join(''));
    setProgress(100);
    setLoaded('forgotten.md');

  } catch (err) {
    progressWrap.classList.remove('visible');
    uploadIcon.textContent = '📄';
    uploadLabel.innerHTML  = `Could not auto-load <span>forgotten.md</span>. Drop it here or click to browse.`;
  }
}

// File picker / drag-drop fallback
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

function processFile(file) {
  uploadLabel.innerHTML = `Reading <span>${file.name}</span>…`;
  setProgress(5);
  const reader = new FileReader();
  reader.onprogress = e => { if (e.lengthComputable) setProgress(Math.round(e.loaded / e.total * 90)); };
  reader.onload = async e => {
    setProgress(95);
    await yieldToUI();
    parseMarkdown(e.target.result);
    setProgress(100);
    setLoaded(file.name);
  };
  reader.readAsText(file);
}

// ── Utils ──────────────────────────────────────────────────────────────────────
const yieldToUI = () => new Promise(r => setTimeout(r, 10));

function highlight(text, query) {
  if (!query) return escHtml(text);
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearSearch() {
  searchInput.value = '';
  applySearch('');
  searchInput.focus();
}

// ── Boot ───────────────────────────────────────────────────────────────────────
autoLoad();
</script>
</body>
</html>
