<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Forgotten Realms Search</title>
<link rel="stylesheet" href="../css_js/5eadb.css">
<style>
  /* Upload zone */
  .upload-zone {
    border: 2px dashed #ccc;
    border-radius: 4px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 10px;
    position: relative;
    color: #888;
    font-size: 16px;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: #666; background: #f8f8f8; }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-label span { font-weight: bold; color: #333; }

  /* Progress bar */
  .progress-wrap { display: none; height: 3px; background: #eee; border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
  .progress-wrap.visible { display: block; }
  .progress-bar { height: 100%; background: #666; width: 0%; transition: width 0.12s linear; }

  /* File info */
  .file-info { display: none; font-size: 14px; color: #666; margin-bottom: 10px; }
  .file-info.visible { display: block; }

  /* Search bar */
  .search-bar { display: flex; gap: 8px; margin-bottom: 6px; }
  .search-bar input[type="text"] {
    flex: 1; padding: 10px; font-size: 16px;
    border: 2px solid #ddd; border-radius: 4px; font-family: sans-serif;
  }
  .search-bar input[type="text"]:focus { border-color: #666; outline: none; }

  .stats { color: #666; font-size: 14px; margin-bottom: 10px; min-height: 16px; }

  /* Virtual scroll */
  #scroll-viewport {
    height: 70vh; overflow-y: auto; position: relative;
    border: 1px solid #ddd; border-radius: 4px;
  }
  #scroll-viewport::-webkit-scrollbar { width: 6px; }
  #scroll-viewport::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  #scroll-spacer { width: 1px; pointer-events: none; }
  #scroll-content { position: absolute; top: 0; left: 0; right: 0; }

  /* Result items — position:absolute required for virtual scrolling */
  .result-item {
    position: absolute; left: 0; right: 0;
    border-bottom: 1px solid #ddd; background: white; overflow: hidden;
    padding: 0;
  }
  .result-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; cursor: pointer; user-select: none; min-height: 52px;
  }
  .result-num { color: #aaa; font-size: 13px; flex-shrink: 0; min-width: 36px; }
  .result-title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .result-title { font-weight: bold; font-size: 16px; color: #333; margin: 0; }
  .result-title mark { background: #ffff99; padding: 0 2px; border-radius: 2px; }
  .result-snippet { font-size: 13px; color: #666; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-snippet mark { background: #fffacc; padding: 0 2px; border-radius: 2px; font-style: normal; }
  .copy-btn {
    background: none; border: 1px solid #ccc; border-radius: 3px;
    color: #999; font-size: 11px; padding: 3px 7px; cursor: pointer; flex-shrink: 0;
    min-height: auto; margin: 0;
  }
  .copy-btn:hover { border-color: #666; color: #333; background: none; }
  .toggle-icon { color: #aaa; font-size: 0.7rem; transition: transform 0.2s; flex-shrink: 0; }
  .toggle-icon.open { transform: rotate(90deg); }
  .result-body { display: none; padding: 0 14px 14px; border-top: 1px solid #ddd; }
  .result-body.open { display: block; }
  .result-body-content { font-size: 14px; color: #555; line-height: 1.6; padding-top: 10px; }
  .result-body-content p { margin: 4px 0 8px; }
  .result-body-content h3 { font-size: 15px; margin: 12px 0 4px; color: #333; }
  .result-body-content h4 { font-size: 14px; margin: 10px 0 3px; color: #444; }
  .result-body-content blockquote {
    border-left: 3px solid #ccc; margin: 6px 0; padding: 2px 10px; color: #777;
  }
  .result-body-content a { color: #444; }
  .result-body-content strong { font-weight: bold; }
  .result-body-content em { font-style: italic; }
  .wiki-link {
    font-size: 12px; color: #888; border: 1px solid #ccc; border-radius: 3px;
    padding: 3px 7px; text-decoration: none; flex-shrink: 0; white-space: nowrap;
    min-height: auto; margin: 0;
  }
  .wiki-link:hover { border-color: #666; color: #333; }
  .bodies-status { font-size: 12px; color: #aaa; margin-left: 6px; }
  /* Group dividers in search results */
  .result-divider {
    position: absolute; left: 0; right: 0;
    padding: 5px 14px;
    background: #f0f0f0;
    border-bottom: 1px solid #ddd;
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: #888;
    display: flex; align-items: center; gap: 8px;
  }
  .result-divider::after {
    content: ''; flex: 1; height: 1px; background: #ddd;
  }
  .empty { text-align: center; padding: 40px 20px; color: #888; font-style: italic; }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .upload-zone { border-color: #444; color: #666; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #888; background: #111; }
    .upload-label span { color: #e0e0e0; }
    .progress-wrap { background: #333; }
    .progress-bar { background: #888; }
    .search-bar input[type="text"] { background: #222; border-color: #555; color: #e0e0e0; }
    .search-bar input[type="text"]:focus { border-color: #888; }
    #scroll-viewport { border-color: #444; }
    .result-item { background: #111; border-bottom-color: #333; }
    .result-divider { background: #1a1a1a; border-bottom-color: #333; color: #555; }
    .result-divider::after { background: #333; }
    .result-title { color: #e0e0e0; }
    .result-num { color: #555; }
    .result-snippet { color: #888; }
    .result-body-content { color: #999; }
    .result-body-content h3 { color: #ccc; }
    .result-body-content h4 { color: #bbb; }
    .result-body-content blockquote { border-left-color: #444; color: #777; }
    .result-body-content a { color: #aaa; }
    .result-body { border-top-color: #333; }
    .wiki-link { border-color: #444; color: #666; }
    .wiki-link:hover { border-color: #888; color: #e0e0e0; }
    .toggle-icon { color: #666; }
    .copy-btn { border-color: #444; color: #666; background: none; }
    .copy-btn:hover { border-color: #888; color: #e0e0e0; background: none; }
    .result-title mark { background: #665500; color: #fff; }
    .result-snippet mark { background: #443300; color: #ddd; }
    .result-body pre mark { background: #665500; color: #fff; }
  }
</style>
</head>
<body>
<div><a href="../index.html">Homebrew Generators</a> → Forgotten Realms</div>

<h1>Forgotten Realms Search</h1>
<p style="color:#666; font-size:14px; margin-bottom:16px;">Search headings &amp; content &nbsp;·&nbsp; press <kbd>/</kbd> to focus</p>

<div class="upload-zone" id="dropZone">
  <input type="file" id="fileInput" accept=".json,.md,.markdown,.txt">
  <p class="upload-label" id="uploadLabel">Auto-loading <span>forgotten.json</span>… &nbsp;(or drop a file here)</p>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="file-info" id="fileInfo">
  Loaded: <span id="fileName"></span> — <span id="entryCount"></span><span class="bodies-status" id="bodiesStatus"></span>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search headings or content..." disabled>
  <button onclick="clearSearch()">Clear</button>
</div>

<div class="stats" id="stats"></div>

<div id="scroll-viewport">
  <div id="scroll-spacer"></div>
  <div id="scroll-content"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let entries     = [];        // { title, titleLower, url, bodyText, bodyLower }
let filtered    = [];        // numbers (entry indices) or strings (divider labels)
let expandedSet = new Set(); // virtual-row indices that are expanded
let bodiesLoaded = false;

const DIVIDER_H = 28; // height of group divider rows (px)

// ── DOM refs ──────────────────────────────────────────────────────────────────
const viewport      = document.getElementById('scroll-viewport');
const spacer        = document.getElementById('scroll-spacer');
const content       = document.getElementById('scroll-content');
const statsEl       = document.getElementById('stats');
const searchInput   = document.getElementById('searchInput');
const fileInfoEl    = document.getElementById('fileInfo');
const uploadLabel   = document.getElementById('uploadLabel');
const progressWrap  = document.getElementById('progressWrap');
const progressBar   = document.getElementById('progressBar');
const bodiesStatus  = document.getElementById('bodiesStatus');

// ── Virtual scroll ────────────────────────────────────────────────────────────
const ROW_H   = 54;
const OVERSCAN = 6;

let rowOffsets = [];

function estimateExpandedHeight(vi) {
  const chars = entries[filtered[vi]].bodyText.length;
  return ROW_H + Math.min(1200, Math.ceil(chars / 80) * 22 + 60);
}

function buildOffsets() {
  rowOffsets = new Float64Array(filtered.length);
  let y = 0;
  for (let i = 0; i < filtered.length; i++) {
    rowOffsets[i] = y;
    if (typeof filtered[i] === 'string') {
      y += DIVIDER_H;                                         // divider row
    } else {
      y += expandedSet.has(i) ? estimateExpandedHeight(i) : ROW_H;
    }
  }
  spacer.style.height = y + 'px';
}

function visibleRange() {
  const top    = viewport.scrollTop;
  const bottom = top + viewport.clientHeight;
  const padTop = top - ROW_H * OVERSCAN;
  const padBot = bottom + ROW_H * OVERSCAN;
  let lo = 0, hi = filtered.length - 1, start = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (rowOffsets[mid] < padTop) { start = mid; lo = mid + 1; }
    else hi = mid - 1;
  }
  let end = start;
  while (end < filtered.length - 1 && rowOffsets[end + 1] < padBot) end++;
  return [start, Math.min(end, filtered.length - 1)];
}

function renderVisible() {
  if (filtered.length === 0) return;
  const [start, end] = visibleRange();
  const q = searchInput.value.trim();

  const existing = new Map();
  for (const node of content.children) existing.set(+node.dataset.vi, node);

  const needed = new Set();
  for (let vi = start; vi <= end; vi++) needed.add(vi);
  for (const [vi, node] of existing) { if (!needed.has(vi)) node.remove(); }

  for (let vi = start; vi <= end; vi++) {
    const row = filtered[vi];

    let item = existing.get(vi);
    if (!item) {
      item = document.createElement('div');
      item.dataset.vi = vi;
      content.appendChild(item);
    }
    item.style.top = rowOffsets[vi] + 'px';

    // ── Divider row ───────────────────────────────────────────────────────────
    if (typeof row === 'string') {
      if (item.dataset.label !== row) {
        item.className   = 'result-divider';
        item.dataset.label = row;
        item.style.height  = DIVIDER_H + 'px';
        item.textContent   = row;
      }
      continue;
    }

    // ── Entry row ─────────────────────────────────────────────────────────────
    const ei      = row;
    const entry   = entries[ei];
    const isOpen  = expandedSet.has(vi);
    const hasBody = entry.bodyText.trim().length > 0;

    const prevOpen = item.dataset.open === '1';
    if (item.dataset.ei !== String(ei) || prevOpen !== isOpen || item.dataset.q !== q) {
      item.className    = 'result-item';
      item.dataset.ei   = ei;
      item.dataset.open = isOpen ? '1' : '0';
      item.dataset.q    = q;
      delete item.dataset.label;

      const snippet = (!isOpen && hasBody && q) ? getSnippet(entry.bodyText, q) : '';
      const wikiBtn = entry.url
        ? `<a class="wiki-link" href="${escHtml(entry.url)}" target="_blank" rel="noopener">Wiki ↗</a>`
        : '';

      item.innerHTML = `
        <div class="result-header">
          <span class="result-num">#${String(vi+1).padStart(3,'0')}</span>
          <div class="result-title-wrap">
            <span class="result-title">${highlight(entry.title, q)}</span>
            ${snippet ? `<span class="result-snippet">${highlight(snippet, q)}</span>` : ''}
          </div>
          ${wikiBtn}
          <button class="copy-btn" data-ei="${ei}">COPY</button>
          ${hasBody ? `<span class="toggle-icon${isOpen ? ' open' : ''}">▶</span>` : ''}
        </div>
        ${hasBody && isOpen
          ? `<div class="result-body open"><div class="result-body-content">${renderMarkdown(entry.bodyText)}</div></div>`
          : ''}
      `;

      const wikiLink = item.querySelector('.wiki-link');
      if (wikiLink) wikiLink.addEventListener('click', e => e.stopPropagation());
      item.querySelector('.copy-btn').addEventListener('click', e => copyEntry(+e.target.dataset.ei, e));
      if (hasBody) {
        item.querySelector('.result-header').addEventListener('click', e => {
          if (!e.target.classList.contains('copy-btn') && !e.target.classList.contains('wiki-link')) {
            toggleRow(vi);
          }
        });
      }
    }
  }
}

function toggleRow(vi) {
  if (expandedSet.has(vi)) expandedSet.delete(vi);
  else expandedSet.add(vi);
  buildOffsets();
  renderVisible();
}

viewport.addEventListener('scroll', renderVisible, { passive: true });
new ResizeObserver(() => { buildOffsets(); renderVisible(); }).observe(viewport);

// ── Search (debounced 200ms) ───────────────────────────────────────────────────
let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => applySearch(searchInput.value.trim()), 200);
});

function applySearch(q) {
  expandedSet.clear();
  const ql = q.toLowerCase();
  if (!ql) {
    filtered = Array.from({ length: entries.length }, (_, i) => i);
    statsEl.textContent = `${entries.length.toLocaleString()} entries loaded`;
  } else {
    const exactMatches = [];   // titleLower === ql
    const titleMatches = [];   // titleLower.includes(ql) but not exact
    const bodyMatches  = [];   // body contains ql but title does not

    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      if (e.titleLower === ql) {
        exactMatches.push(i);
      } else if (e.titleLower.includes(ql)) {
        titleMatches.push(i);
      } else if (e.bodyLower.includes(ql)) {
        bodyMatches.push(i);
      }
    }

    // Build mixed filtered array with string dividers between groups
    filtered = [];
    if (exactMatches.length) {
      filtered.push(`Exact match (${exactMatches.length})`);
      for (const i of exactMatches) filtered.push(i);
    }
    if (titleMatches.length) {
      filtered.push(`Title matches (${titleMatches.length})`);
      for (const i of titleMatches) filtered.push(i);
    }
    if (bodyMatches.length) {
      filtered.push(`Body matches (${bodyMatches.length})`);
      for (const i of bodyMatches) filtered.push(i);
    }

    const total = exactMatches.length + titleMatches.length + bodyMatches.length;
    const parts = [];
    if (exactMatches.length) parts.push(`${exactMatches.length} exact`);
    if (titleMatches.length) parts.push(`${titleMatches.length} title`);
    if (bodyMatches.length)  parts.push(`${bodyMatches.length} body`);
    const bodyNote = (!bodiesLoaded && q) ? ' · bodies still loading' : '';
    statsEl.textContent = total
      ? `${parts.join(' · ')} matches${bodyNote}`
      : `No matches${bodyNote}`;
  }

  // Auto-expand all matching entries when a search query is active
  if (ql) {
    for (let vi = 0; vi < filtered.length; vi++) {
      const row = filtered[vi];
      if (typeof row === 'number' && entries[row].bodyText.trim()) {
        expandedSet.add(vi);
      }
    }
  }

  viewport.scrollTop = 0;
  content.innerHTML  = '';
  if (filtered.length === 0) {
    spacer.style.height = '0px';
    content.innerHTML = `<div class="empty">${entries.length ? 'No matches found' : 'Load a file to begin'}</div>`;
    return;
  }
  buildOffsets();
  renderVisible();
}

// ── Markdown renderer ─────────────────────────────────────────────────────────
function renderMarkdown(text) {
  const lines = text.split('\n');
  let html = '';
  let inBlockquote = false;

  for (const line of lines) {
    if (line.startsWith('### ')) {
      if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
      html += `<h4>${escHtml(line.slice(4))}</h4>`;
    } else if (line.startsWith('## ')) {
      if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
      html += `<h3>${escHtml(line.slice(3))}</h3>`;
    } else if (line.startsWith('> ')) {
      if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
      html += `<p>${inlineMarkdown(line.slice(2))}</p>`;
    } else if (line.trim() === '') {
      if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
    } else {
      if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
      html += `<p>${inlineMarkdown(line)}</p>`;
    }
  }
  if (inBlockquote) html += '</blockquote>';
  return html;
}

function inlineMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ── Parser (fast single-pass, fallback for raw .md files) ────────────────────
function parseMarkdown(text) {
  entries = [];
  const len = text.length;
  let lineStart = 0, currentTitle = null, bodyStart = 0;

  function flush(end) {
    if (currentTitle !== null) {
      const bodyText = text.slice(bodyStart, end).trimEnd();
      entries.push({ title: currentTitle, titleLower: currentTitle.toLowerCase(),
                     url: '', bodyText, bodyLower: bodyText.toLowerCase() });
      currentTitle = null;
    }
  }
  while (lineStart < len) {
    let lineEnd = text.indexOf('\n', lineStart);
    if (lineEnd === -1) lineEnd = len;
    const lineLen = lineEnd - lineStart;
    if (text.charCodeAt(lineStart) === 35 && text.charCodeAt(lineStart + 1) === 32) {
      flush(lineStart);
      currentTitle = text.slice(lineStart + 2, lineEnd).trim();
      bodyStart = lineEnd + 1;
    } else if (lineLen === 3 && text.charCodeAt(lineStart) === 45 &&
               text.charCodeAt(lineStart+1) === 45 && text.charCodeAt(lineStart+2) === 45) {
      flush(lineStart);
    }
    lineStart = lineEnd + 1;
  }
  flush(len);
}

// ── Load helpers ──────────────────────────────────────────────────────────────
function setProgress(pct) {
  progressWrap.classList.add('visible');
  progressBar.style.width = pct + '%';
}

function setLoaded(name) {
  uploadLabel.innerHTML = `Loaded <span>${name}</span>`;
  document.getElementById('fileName').textContent  = name;
  document.getElementById('entryCount').textContent = `${entries.length.toLocaleString()} entries`;
  fileInfoEl.classList.add('visible');
  progressWrap.classList.remove('visible');
  searchInput.disabled = false;
  searchInput.focus();
  applySearch('');
}

// Stream a URL and return the full text, updating progress bar between pctStart–pctEnd
async function streamText(url, pctStart, pctEnd) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const total   = +res.headers.get('Content-Length') || 0;
  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let received  = 0;
  const parts   = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    received += value.length;
    parts.push(decoder.decode(value, { stream: true }));
    if (total) setProgress(pctStart + Math.round(received / total * (pctEnd - pctStart)));
  }
  parts.push(decoder.decode());
  return parts.join('');
}

// Load the new split index format
function loadFromIndexJSON(data) {
  bodiesLoaded = false;
  entries = data.map(item => ({
    title:      item.t,
    titleLower: item.t.toLowerCase(),
    url:        item.u || '',
    bodyText:   '',
    bodyLower:  ''
  }));
}

// Populate bodies once the background fetch completes
function populateBodies(bodiesData) {
  bodiesData.forEach((body, i) => {
    if (entries[i]) {
      entries[i].bodyText  = body;
      entries[i].bodyLower = body.toLowerCase();
    }
  });
  bodiesLoaded = true;
  bodiesStatus.textContent = '';
  // Re-run current search to include body matches
  applySearch(searchInput.value.trim());
}

// Load bodies in background while page is already usable
async function loadBodiesInBackground() {
  bodiesStatus.textContent = ' · loading full text…';
  try {
    const raw = await streamText('forgotten_bodies.json', 0, 0); // no progress bar (already done)
    await yieldToUI();
    populateBodies(JSON.parse(raw));
  } catch (e) {
    bodiesStatus.textContent = ' · full text unavailable';
  }
}

// Load the old combined format (backward compatibility)
function loadFromJSON(data) {
  bodiesLoaded = true;
  entries = data.map(item => ({
    title:      item.t,
    titleLower: item.t.toLowerCase(),
    url:        item.u || '',
    bodyText:   item.b || '',
    bodyLower:  (item.b || '').toLowerCase()
  }));
}

// ── Auto-load: index → bodies (background) → combined JSON → raw MD ──────────
async function autoLoad() {
  // 1. Try new split index (fast first load)
  try {
    const raw = await streamText('forgotten_index.json', 0, 90);
    setProgress(95);
    await yieldToUI();
    loadFromIndexJSON(JSON.parse(raw));
    setProgress(100);
    setLoaded('forgotten_index.json');
    loadBodiesInBackground(); // fire and forget
    return;
  } catch (e) { /* fall through */ }

  // 2. Try combined JSON (previous format)
  try {
    const raw = await streamText('forgotten.json', 0, 90);
    setProgress(95);
    await yieldToUI();
    loadFromJSON(JSON.parse(raw));
    setProgress(100);
    setLoaded('forgotten.json');
    return;
  } catch (e) { /* fall through */ }

  // 3. Try raw markdown
  try {
    const raw = await streamText('forgotten.md', 0, 90);
    setProgress(95);
    await yieldToUI();
    parseMarkdown(raw);
    setProgress(100);
    setLoaded('forgotten.md');
    return;
  } catch (e) { /* fall through */ }

  progressWrap.classList.remove('visible');
  uploadLabel.innerHTML = `Could not auto-load. Drop <span>forgotten_index.json</span> or <span>forgotten.md</span> here.`;
}

// ── File picker / drag-drop fallback ─────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

function processFile(file) {
  uploadLabel.innerHTML = `Reading <span>${file.name}</span>…`;
  setProgress(5);
  const reader = new FileReader();
  reader.onprogress = e => { if (e.lengthComputable) setProgress(Math.round(e.loaded / e.total * 90)); };
  reader.onload = async e => {
    setProgress(95);
    await yieldToUI();
    const name = file.name;
    if (name.endsWith('_index.json')) {
      loadFromIndexJSON(JSON.parse(e.target.result));
    } else if (name.endsWith('.json')) {
      loadFromJSON(JSON.parse(e.target.result));
    } else {
      parseMarkdown(e.target.result);
    }
    setProgress(100);
    setLoaded(name);
  };
  reader.readAsText(file);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const yieldToUI = () => new Promise(r => setTimeout(r, 10));

function highlight(text, query) {
  if (!query) return escHtml(text);
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getSnippet(bodyText, query) {
  if (!query || !bodyText) return '';
  const ql = query.toLowerCase();
  for (const line of bodyText.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const idx = trimmed.toLowerCase().indexOf(ql);
    if (idx === -1) continue;
    if (trimmed.length <= 120) return trimmed;
    const start = Math.max(0, idx - 40);
    const end   = Math.min(trimmed.length, idx + query.length + 60);
    return (start > 0 ? '…' : '') + trimmed.slice(start, end) + (end < trimmed.length ? '…' : '');
  }
  return '';
}

function copyEntry(ei, event) {
  event.stopPropagation();
  const entry = entries[ei];
  const text  = entry.bodyText ? `${entry.title}\n\n${entry.bodyText}` : entry.title;
  const btn   = event.currentTarget;

  function showOk()   { btn.textContent = '✓'; btn.style.color = '#333'; setTimeout(() => { btn.textContent = 'COPY'; btn.style.color = ''; }, 1400); }
  function showFail() { btn.textContent = '✗'; setTimeout(() => { btn.textContent = 'COPY'; }, 1400); }

  function legacyCopy() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:2px;height:2px;opacity:0;border:none;outline:none';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy') ? showOk() : showFail(); }
    catch { showFail(); }
    document.body.removeChild(ta);
  }

  // navigator.clipboard requires HTTPS; on file:// fall straight to legacy
  if (window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showOk).catch(legacyCopy);
  } else {
    legacyCopy();
  }
}

function clearSearch() {
  searchInput.value = '';
  applySearch('');
  searchInput.focus();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput && !searchInput.disabled) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.blur();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
autoLoad();
</script>
